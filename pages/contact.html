<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Get in Touch</title>
    <link rel="stylesheet" href="../src/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <nav>
                <a href="../index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
                <a href="staff.html">Noble Staff</a>
            </nav>
        </div>
    </header>

    <section class="section hero-banner" style="background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('../images/OIP skin care.jpg') no-repeat center center/cover; padding: 100px 20px;">
        <h1 Contact Our Beauty Experts</h1>
        <p Have questions about our premium cosmetics or need skincare advice? We are here to help you shine.</p>
    </section>

    <section id="contact" class="section">
        <h2>Send Us a Message</h2>
        <p>Fill out the form below, and our dedicated team will get back to you within 24 hours.</p>
        
        <form class="contact-form" action="#" method="POST"><br>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your first and last name" required>

            <label for="email">Email Address</label><br>
            <input type="email" id="email" name="email" placeholder="yourname@example.com" required>

            <label for="subject">Subject</label><br>
            <input type="text" id="subject" name="subject" placeholder="e.g., Product Inquiry, Order Status, Consultation" required>

            <label for="message">Your Message</label><br>
            <textarea id="message" name="message" rows="6" placeholder="Write your questions or notes here..." required></textarea>

            <button type="submit">Submit Inquiry</button><br>
        </form>

        <div class="contact-details">
            <p><strong>Direct Email:</strong> <a href="mailto:princessruth759@gmail.com">princessruth759@gmail.com</a></p>
            <p><strong>Phone Support:</strong> <a href="tel:+233202144819">+233 20 214 4819</a></p>
            <p style="margin-top: 15px; font-size: 14px; color: #777;">Available Monday through Friday: 9:00 AM – 6:00 PM</p>
        </div>
    </section>

    

</body>
</html>
